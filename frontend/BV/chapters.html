<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhagavad Gita - Chapters</title>
    
    <link rel="stylesheet" href="../DASHBOARD/style.css">
    <link rel="stylesheet" href="chapters.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=MedievalSharp&family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Divine Cursor -->
    <div class="divine-cursor"></div>

    <!-- Decorative Background Layer -->
    <canvas id="dustCanvas"></canvas>

    <!-- ================= NAVBAR ================= -->
    <header class="navbar">
        <div class="container nav-content">
            <div class="logo">Bhagavad Gītā</div>
            <div class="right-section">
                <nav class="nav-menu">
                    <a href="../DASHBOARD/index.html">Home</a>
                    <a href="../DASHBOARD/index.html#about">About</a>
                    <a href="chapters.html" class="active">Chapters</a>
                    <a href="../DASHBOARD/index.html#team">TeamXplore</a>
                    <a href="../DASHBOARD/index.html#contact">Contact</a>
                </nav>
                <button class="hamburger" aria-label="Toggle menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <a href="../BV/translation.html" class="glow-btn">Translate</a>
                
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="chapters-main">
        <div class="chapters-hero">
            <h1 class="chapters-title">The 18 Chapters</h1>
            <p class="chapters-subtitle">700 Verses of Eternal Wisdom</p>
        </div>

        <div class="chapters-container">
            <!-- Chapter cards will be generated by JavaScript -->
        </div>
    </main>

    <script src="chapters.js"></script>

    <script>
    // Hamburger menu toggle
    document.addEventListener('DOMContentLoaded', function() {
      const hamburger = document.querySelector('.hamburger');
      const navMenu = document.querySelector('.nav-menu');

      hamburger.addEventListener('click', function() {
        hamburger.classList.toggle('active');
        navMenu.classList.toggle('active');
      });

      // Close menu when clicking a link
      const navLinks = document.querySelectorAll('.nav-menu a');
      navLinks.forEach(link => {
        link.addEventListener('click', function() {
          hamburger.classList.remove('active');
          navMenu.classList.remove('active');
        });
      });

      // Close menu when clicking outside
      document.addEventListener('click', function(event) {
        if (!hamburger.contains(event.target) && !navMenu.contains(event.target)) {
          hamburger.classList.remove('active');
          navMenu.classList.remove('active');
        }
      });
    });
    </script>

</body>
</html>
